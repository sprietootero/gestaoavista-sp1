name: Atualizar Dados w1nner

on:
  schedule:
    # Das 9h às 20h59 BRT em dias úteis (12h–23h59 UTC)
    - cron: '*/30 12-23 * * 1-5'
    # Das 21h às 00h BRT em dias úteis (00h–03h UTC do dia seguinte)
    - cron: '*/30 0-3 * * 2-6'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2

      - name: Instalar dependências Python e browser
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Rodar robô
        env:
          CONTA1_EMAIL:     ${{ secrets.CONTA1_EMAIL }}
          CONTA1_SENHA:     ${{ secrets.CONTA1_SENHA }}
          NOME_ESCRITORIO:  ${{ secrets.NOME_ESCRITORIO }}
        run: python robo.py

      - name: Commit e push dos CSVs atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_extraidos.csv ranking_muapd.csv ranking_7dias.csv metas.json
          git diff --cached --quiet || git commit -m "dados: atualização automática $(date -u '+%d/%m/%Y %H:%M') UTC"
          git pull --rebase origin main
          git push
